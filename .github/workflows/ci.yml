name: CI

on:
  push:
  pull_request:

jobs:
  basic-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm --version
      - run: node --version
      - run: npm install
      - run: npm run dev -- --help || true
